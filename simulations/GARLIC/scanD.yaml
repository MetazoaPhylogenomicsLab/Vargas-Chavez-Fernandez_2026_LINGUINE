seed: 12345
output_directory: 'sim_output_5_species'

# --- Ancestral Genome Parameters ---
num_ancestral_ogs: 5000
num_chromosomes: 15
geom_prob: 0.9 
same_chr_prob: 0.70 
min_chr_size: 100000
max_chr_size: 500000
min_gene_size: 500
max_gene_size: 2000

# The Newick tree
tree_string: '((SpeciesA,SpeciesB)Node_AB,SpeciesC)Root;'

# --- Branch Events ---
BranchEvents:
  SpeciesA:
    - Type: gene_loss
      Value: 0.10
  SpeciesB:
    - Type: gene_loss
      Value: 0.10
