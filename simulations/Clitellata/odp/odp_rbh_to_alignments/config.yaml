#
# This is the example config file for odp_rbh_to_alignments
#
# The goal of this program is to create protein alignments of the
#  orthologs, and to set up a database to use for the rest of odp.
#
# The .rbh file should contain the `group` and the `color` columns for
#  each of the rows. This creates groups and colors for each inferred ALG.
#
# The .rbh file you should use for this is most likely the output of
#  the program odp_nway_rbh, and the file
#  odp_nway_rbh/step3-unwrap/{analysis}.filt.unwrapped.rbh
#
# The rbh file mentioned above ^ will contain only the significantly large
#  ALGs that are annotated with an abstract group name and color

rbh_file: Annelida/odp/odp_merge/odp_rbh_merge/output/EAND.mer 
duplicate_proteins: "pass"    # currently only "fail" or "best". Fail doesn't allow duplicate names or seqs


# Every species that is in the rbh file should also be specified
#  below in the `species` section.
species:
  EAND:
    proteins: Annelida/odp/EAND.faa
    chrom: Annelida/odp/EAND.chrom
    genome: Annelida/odp/EAND.fna
    minscafsize: 10000000
  MVUL:
    proteins: Annelida/odp/MVUL.faa
    chrom: Annelida/odp/MVUL.chrom
    genome: Annelida/odp/MVUL.fna
    minscafsize: 10000000
  BLOB:
    proteins: Annelida/odp/BLOB.faa
    chrom: Annelida/odp/BLOB.chrom
    genome: Annelida/odp/BLOB.fna
    minscafsize: 10000000
  HMAN:
    proteins: Annelida/odp/HMAN.faa
    chrom: Annelida/odp/HMAN.chrom
    genome: Annelida/odp/HMAN.fna
    minscafsize: 10000000
  DELA:
    proteins: Annelida/odp/DELA.faa
    chrom: Annelida/odp/DELA.chrom
    genome: Annelida/odp/DELA.fna
    minscafsize: 10000000
  NNAJ:
    proteins: Annelida/odp/NNAJ.faa
    chrom: Annelida/odp/NNAJ.chrom
    genome: Annelida/odp/NNAJ.fna
    minscafsize: 10000000
  PCOS:
    proteins: Annelida/odp/PCOS.faa
    chrom: Annelida/odp/PCOS.chrom
    genome: Annelida/odp/PCOS.fna
    minscafsize: 10000000
  SCAV:
    proteins: Annelida/odp/SCAV.faa
    chrom: Annelida/odp/SCAV.chrom
    genome: Annelida/odp/SCAV.fna
    minscafsize: 10000000
